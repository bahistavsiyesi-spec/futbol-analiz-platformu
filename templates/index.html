<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Futbol Analiz Platformu</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="container">

    <div class="left-panel">
      <div class="panel-header">
        <h2>📅 Bugünün Maçları</h2>

        <div class="buttons">
          <button class="btn">🔄 Yenile</button>
          <button class="btn green">✔ Tümünü Seç</button>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="analysis-card">

        <div class="league-title">
          ⚽ Lig
          <span class="match-time">--:--</span>
        </div>

        <div class="teams-row">
          <div class="team">
            Maç Seçilmedi
            <span>N/A</span>
          </div>

          <div class="vs">⚽</div>

          <div class="team">
            Takım Seçilmedi
            <span>N/A</span>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-title">2.5 GOL ÜSTÜ</div>
            <div class="percent">--</div>
          </div>

          <div class="stat">
            <div class="stat-title">İY 0.5 ÜST</div>
            <div class="percent">--</div>
          </div>

          <div class="stat">
            <div class="stat-title">KG VAR</div>
            <div class="percent">--</div>
          </div>

          <div class="stat">
            <div class="stat-title">GOL ORT.</div>
            <div class="percent">--</div>
          </div>
        </div>

        <div class="score">
          <div>
            <span>🎯 TAHMİNİ SKOR</span>
            <b>--</b>
          </div>

          <div class="confidence">
            Bekleniyor
          </div>
        </div>

        <div class="analysis">
          <div class="title">🧠 ANALİZ GEREKÇESİ</div>
          <ul>
            <li>Soldan maç seçildiğinde analiz burada görünecek.</li>
          </ul>
        </div>

      </div>

      <button class="delete">🗑 Tümünü Sil</button>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
